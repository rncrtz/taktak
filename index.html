<script>
document.addEventListener("DOMContentLoaded", function () {

    // ===== LOAD SAVED VALUES =====
    const savedDate = localStorage.getItem("savedDate");
    const savedLink = localStorage.getItem("savedLink");
    const savedAlbum = localStorage.getItem("albumNumber");
    const savedAlbum2 = localStorage.getItem("album2Number");

    if (savedDate) {
        document.getElementById("dateInput").value = savedDate;
        updateDate();
    }

    if (savedLink) {
        document.getElementById("linkInput").value = savedLink;
        updateLink();
    }

    if (savedAlbum !== null) {
        document.getElementById("albumInput").value = savedAlbum;
        document.getElementById("album").textContent = savedAlbum;
    }

    if (savedAlbum2 !== null) {
        document.getElementById("album2Input").value = savedAlbum2;
        document.getElementById("album2").textContent = savedAlbum2;
    }

    // ===== COPY FUNCTION =====
    document.querySelectorAll('.copyDiv').forEach(div => {
        div.addEventListener('click', async function () {
            try {
                await navigator.clipboard.writeText(this.innerText);
                alert("Copied successfully!");
            } catch (err) {
                alert("Copy failed. Use HTTPS.");
            }
        });
    });

});


// ===== UPDATE DATE =====
function updateDate() {
    const dateInput = document.getElementById("dateInput").value;
    if (!dateInput) return;

    localStorage.setItem("savedDate", dateInput);

    const date = new Date(dateInput);
    const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
    const formattedDate = date.toLocaleDateString("en-US", options);

    document.querySelectorAll(".date").forEach(el => {
        el.textContent = formattedDate;
    });
}


// ===== UPDATE LINK =====
function updateLink() {
    const linkInput = document.getElementById("linkInput").value;
    localStorage.setItem("savedLink", linkInput);

    const linkElement = document.getElementById("flickersLink");
    if (linkInput) {
        linkElement.href = linkInput;
        linkElement.textContent = "Click to view album";
    }
}


// ===== UPDATE ALBUM =====
function updateAlbum() {
    let input = document.getElementById("albumInput").value || "1";
    document.getElementById("album").textContent = input;
    localStorage.setItem("albumNumber", input);
}


// ===== UPDATE ALBUM 2 =====
function updateAlbum2() {
    let input = document.getElementById("album2Input").value || "0";
    document.getElementById("album2").textContent = input;
    localStorage.setItem("album2Number", input);
}
</script>
